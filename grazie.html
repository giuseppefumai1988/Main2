<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grazie — ANIQRC</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#0A0A0A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#F4F2EC; --ink:#0A0A0A; --soft:#34332F; --mute:#75736B; --accent:#E63946; --accent-deep:#C0202E; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'Manrope',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:32px; -webkit-font-smoothing:antialiased; }
  .card { max-width:540px; }
  .mark { width:96px; height:96px; margin:0 auto 36px; animation:pop 0.8s cubic-bezier(0.16,1,0.3,1); }
  .mark svg { width:100%; height:100%; }
  .eyebrow { font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.28em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
  h1 { font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:clamp(34px,7vw,54px); letter-spacing:-0.035em; line-height:1.02; margin-bottom:20px; }
  h1 .q { color:var(--accent); }
  p { font-size:17px; color:var(--soft); line-height:1.6; margin-bottom:32px; }
  .btn { display:inline-flex; align-items:center; gap:10px; padding:15px 32px; border-radius:100px; font-size:15px; font-weight:600; text-decoration:none; background:var(--ink); color:var(--bg); transition:all 0.3s cubic-bezier(0.16,1,0.3,1); }
  .btn:hover { background:var(--accent); transform:translateY(-2px); }
  @keyframes pop { from{opacity:0;transform:scale(0.8) rotate(-8deg);} to{opacity:1;transform:scale(1) rotate(0);} }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <circle cx="200" cy="200" r="160" fill="#0A0A0A"/>
        <circle cx="200" cy="200" r="130" fill="none" stroke="#F4F2EC" stroke-width="1.5" opacity="0.5"/>
        <rect x="186" y="100" width="28" height="200" fill="#F4F2EC"/>
        <rect x="100" y="186" width="200" height="28" fill="#F4F2EC"/>
        <circle cx="200" cy="200" r="9" fill="#E63946"/>
        <g transform="translate(200,200) rotate(45)"><rect x="50" y="-13" width="92" height="26" fill="#E63946"/></g>
      </svg>
    </div>
    <div class="eyebrow">Richiesta ricevuta</div>
    <h1>Grazie per averci <span class="q">scritto</span>.</h1>
    <p>La tua richiesta è stata inviata correttamente. Ti risponderemo all'indirizzo email che hai indicato. A presto in ANIQRC.</p>
    <a href="index.html" class="btn">← Torna al sito</a>
  </div>
</body>
</html>
